spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:library_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&autoReconnect=true&maxReconnects=3&connectTimeout=10000&socketTimeout=30000
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000
      leak-detection-threshold: 60000

jwt:
  secret: ${JWT_SECRET:Dev0nlyS3cr3tK3yF0rL0calT3st1ng2024D0N0tUs3InPr0d!}
  expiration: ${JWT_EXPIRATION:3600000}

logging:
  level:
    com.library: debug
    com.library.mapper: debug
    org.springframework.security: info
