spring:
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:library_db}?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000
      leak-detection-threshold: 60000
      pool-name: LibraryHikariPool

# ===========================================
# 生产环境优雅停机配置
# ===========================================
server:
  shutdown: graceful
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: warn
    com.library: info
    com.library.mapper: warn
    org.springframework.security: warn
    org.springframework.web: warn
  file:
    name: /app/logs/library-system.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 30
      total-size-cap: 3GB
      clean-history-on-start: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}
      profile: prod
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 100ms,200ms,500ms,1s,2s,5s
  server:
    port: ${ACTUATOR_PORT:-1}

alert:
  enabled: true
  error-threshold: 10
  email:
    enabled: false
    to: admin@library.com
  webhook:
    url: ${ALERT_WEBHOOK_URL:}

security:
  rate-limit:
    api-max-requests: ${API_RATE_LIMIT:200}
    api-window-seconds: 60
  encryption:
    aes-key: ${AES_SECRET_KEY}
  password-policy:
    min-length: 8
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special: false
