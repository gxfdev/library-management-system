server:
  servlet:
    context-path: /

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
    username: sa
    password:

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql

  cache:
    type: none

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: a3F4ZjhtN2s5cDJ3eHVpMm5nYjdsb2twMTIzNDU2Nzg5MGFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

login:
  rate-limit:
    max-attempts: 1000

register:
  rate-limit:
    max-attempts: 1000

security:
  request:
    timestamp-tolerance: 300000
    nonce-cache-size: 10000
  rate-limit:
    api-max-requests: 1000
    api-window-seconds: 60

cors:
  allowed-origins: http://localhost:5173

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

knife4j:
  enable: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  metrics:
    export:
      prometheus:
        enabled: false

alert:
  enabled: false

logging:
  level:
    com.library: warn
