name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: library_db_test
          MYSQL_CHARSET: utf8mb4
          MYSQL_COLLATION: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Wait for services to be ready
      run: |
        echo "Waiting for MySQL..."
        for i in {1..30}; do
          if mysqladmin ping -h "127.0.0.1" --silent 2>/dev/null; then
            echo "✓ MySQL is ready!"
            break
          fi
          echo "  Attempt $i/30..."
          sleep 2
        done
        
        echo "Waiting for Redis..."
        for i in {1..15}; do
          if redis-cli -h 127.0.0.1 ping 2>/dev/null | grep -q PONG; then
            echo "✓ Redis is ready!"
            break
          fi
          echo "  Attempt $i/15..."
          sleep 1
        done

    - name: Initialize database schema and data
      env:
        MYSQL_PWD: root
      run: |
        echo "Creating database schema in library_db_test..."
        
        # 使用 library_db_test 数据库创建表结构
        mysql -h 127.0.0.1 -u root library_db_test << 'EOF'
        SET NAMES utf8mb4;
        SET CHARACTER SET utf8mb4;
        
        CREATE TABLE IF NOT EXISTS `sys_user` (
          `id` BIGINT NOT NULL AUTO_INCREMENT,
          `username` VARCHAR(50) NOT NULL,
          `password` VARCHAR(200) NOT NULL,
          `real_name` VARCHAR(50) DEFAULT NULL,
          `phone` VARCHAR(20) DEFAULT NULL,
          `email` VARCHAR(100) DEFAULT NULL,
          `avatar` VARCHAR(500) DEFAULT NULL,
          `role` VARCHAR(20) NOT NULL DEFAULT 'READER',
          `status` TINYINT NOT NULL DEFAULT 1,
          `deleted` TINYINT NOT NULL DEFAULT 0,
          `create_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
          `update_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          UNIQUE KEY `uk_username` (`username`)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
        
        CREATE TABLE IF NOT EXISTS `book_category` (
          `id` BIGINT NOT NULL AUTO_INCREMENT,
          `name` VARCHAR(100) NOT NULL,
          `parent_id` BIGINT NOT NULL DEFAULT 0,
          `level` TINYINT NOT NULL DEFAULT 1,
          `sort_order` INT NOT NULL DEFAULT 0,
          `status` TINYINT NOT NULL DEFAULT 1,
          `deleted` TINYINT NOT NULL DEFAULT 0,
          `create_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
          `update_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
        
        CREATE TABLE IF NOT EXISTS `book` (
          `id` BIGINT NOT NULL AUTO_INCREMENT,
          `isbn` VARCHAR(20) NOT NULL,
          `title` VARCHAR(200) NOT NULL,
          `author` VARCHAR(200) DEFAULT NULL,
          `publisher` VARCHAR(200) DEFAULT NULL,
          `publish_date` DATE DEFAULT NULL,
          `category_id` BIGINT DEFAULT NULL,
          `price` DECIMAL(10,2) DEFAULT NULL,
          `pages` INT DEFAULT NULL,
          `cover_image` VARCHAR(500) DEFAULT NULL,
          `description` TEXT DEFAULT NULL,
          `location` VARCHAR(100) DEFAULT NULL,
          `stock_total` INT NOT NULL DEFAULT 1,
          `stock_available` INT NOT NULL DEFAULT 1,
          `status` TINYINT NOT NULL DEFAULT 1,
          `deleted` TINYINT NOT NULL DEFAULT 0,
          `create_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
          `update_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`),
          UNIQUE KEY `uk_isbn` (`isbn`)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
        
        CREATE TABLE IF NOT EXISTS `borrow_record` (
          `id` BIGINT NOT NULL AUTO_INCREMENT,
          `user_id` BIGINT NOT NULL,
          `book_id` BIGINT NOT NULL,
          `borrow_date` DATE NOT NULL,
          `due_date` DATE NOT NULL,
          `return_date` DATE DEFAULT NULL,
          `renew_count` TINYINT NOT NULL DEFAULT 0,
          `status` VARCHAR(20) NOT NULL DEFAULT 'BORROWING',
          `remark` VARCHAR(500) DEFAULT NULL,
          `deleted` TINYINT NOT NULL DEFAULT 0,
          `create_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
          `update_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
        
        CREATE TABLE IF NOT EXISTS `fine_record` (
          `id` BIGINT NOT NULL AUTO_INCREMENT,
          `borrow_id` BIGINT NOT NULL,
          `user_id` BIGINT NOT NULL,
          `amount` DECIMAL(10,2) NOT NULL,
          `reason` VARCHAR(500) DEFAULT NULL,
          `status` VARCHAR(20) NOT NULL DEFAULT 'UNPAID',
          `pay_time` DATETIME DEFAULT NULL,
          `deleted` TINYINT NOT NULL DEFAULT 0,
          `create_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
          `update_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
        
        CREATE TABLE IF NOT EXISTS `sys_log` (
          `id` BIGINT NOT NULL AUTO_INCREMENT,
          `username` VARCHAR(50) DEFAULT NULL,
          `operation` VARCHAR(200) DEFAULT NULL,
          `method` VARCHAR(200) DEFAULT NULL,
          `params` TEXT DEFAULT NULL,
          `ip` VARCHAR(50) DEFAULT NULL,
          `execution_time` BIGINT DEFAULT NULL,
          `create_time` DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
          PRIMARY KEY (`id`)
        ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_unicode_ci;
        
        INSERT INTO `sys_user` (`username`, `password`, `real_name`, `phone`, `email`, `role`, `status`) VALUES
        ('admin', '$2a$10$WFJvStr2.OtGuzIOcWb2C.cOgELgzzsQATtI0YO0Gop4IGYhMGCEu', 'Admin', '13800138000', 'admin@library.com', 'ADMIN', 1),
        ('librarian', '$2a$10$WFJvStr2.OtGuzIOcWb2C.cOgELgzzsQATtI0YO0Gop4IGYhMGCEu', 'Librarian', '13800138001', 'librarian@library.com', 'LIBRARIAN', 1),
        ('reader', '$2a$10$WFJvStr2.OtGuzIOcWb2C.cOgELgzzsQATtI0YO0Gop4IGYhMGCEu', 'Reader', '13800138002', 'reader@library.com', 'READER', 1);
        
        INSERT INTO `book_category` (`name`, `parent_id`, `level`, `sort_order`) VALUES
        ('Computer Science', 0, 1, 1),
        ('Literature', 0, 1, 2),
        ('Science', 0, 1, 3);
        
        EOF
        
        echo "✓ Database initialized successfully!"

    - name: Run tests with Maven
      working-directory: backend
      run: |
        mvn -B test \
          -Dspring.profiles.active=test \
          -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/library_db_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true \
          -Dspring.datasource.username=root \
          -Dspring.datasource.password=root \
          -Dspring.data.redis.host=127.0.0.1 \
          -Dspring.data.redis.port=6379 \
          -Dlogging.level.com.library=INFO

    - name: Build package (if tests pass)
      working-directory: backend
      if: success()
      run: mvn -B package -DskipTests -Dmaven.javadoc.skip=true

    - name: Upload test reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ci-test-results
        path: |
          backend/target/surefire-reports/
          backend/target/*.log
        retention-days: 30

    - name: Update dependency graph
      if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
      with:
        directory: backend
