name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: library_db_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Wait for MySQL to be ready
      run: |
        while ! mysqladmin ping -h "127.0.0.1" --silent; do
          echo "Waiting for MySQL..."
          sleep 2
        done
        echo "MySQL is ready!"

    - name: Initialize database
      env:
        MYSQL_PWD: 123456
      run: |
        mysql -h 127.0.0.1 -u root < backend/sql/init.sql
        echo "Database initialized successfully!"

    - name: Run tests with Maven
      working-directory: backend
      env:
        SPRING_PROFILES_ACTIVE: test
        MYSQL_HOST: 127.0.0.1
        MYSQL_PORT: 3306
        MYSQL_DB: library_db_test
        MYSQL_USER: root
        MYSQL_PASSWORD: 123456
        REDIS_HOST: 127.0.0.1
        REDIS_PORT: 6379
      run: |
        mvn -B test \
          -Dspring.profiles.active=test \
          -Dspring.datasource.url=jdbc:mysql://127.0.0.1:3306/library_db_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true \
          -Dspring.data.redis.host=127.0.0.1 \
          -Dspring.data.redis.port=6379

    - name: Build package
      working-directory: backend
      if: success()
      run: mvn -B package -DskipTests

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: backend/target/surefire-reports/
        retention-days: 30

    - name: Update dependency graph
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
      with:
        directory: backend
